name: mlenv
channels:
  - conda-forge
  - pytorch
  - defaults

dependencies:
  # Python version
  - python=3.10

  # Core scientific stack
  - numpy=1.25.*
  - pandas=1.6.*
  - scipy=1.11.*
  - scikit-learn=1.2.*
  - matplotlib=3.8.*
  - seaborn=0.12.*

  # Notebooks / dev
  - jupyterlab=4.3.*
  - notebook=7.3.*
  - ipykernel=6.27.*
  - jupytext=1.16.*

  # Utilities
  - tqdm=4.66.*
  - joblib=1.3.*
  
  # Data formats
  - openpyxl=3.1.*
  - xlrd=2.0.*

  # Visualization
  - plotly=5.16.*

  # ML
  - xgboost=1.7.*
  - statsmodels=0.14.*
  - shap=0.42.*

  # PyTorch (MPS / Metal-ready)
  - pytorch=2.2.*
  - torchvision=0.17.*
  - torchaudio=2.2.*

  # Pip-only Apple TensorFlow stack
  - pip:
      - tensorflow-macos==2.14.0
      - tensorflow-metal==2.14.0

  # Optional dev tools
      - black==23.12.0
      - isort==5.12.0
      - pytest==8.3.*